<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI Translate 设置</title>
  <style>
    :root { color-scheme: light; }
    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #1a1a18;
      background: #ffffff;
    }
    h1 { font-size: 15px; margin: 0 0 12px; }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-weight: 600;
      color: #444441;
      margin-bottom: 4px;
    }
    .hint { font-weight: 400; color: #888780; font-size: 11px; }
    input, select {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      padding: 6px 8px;
      border: 1px solid #d8d5cc;
      border-radius: 6px;
      background: #fff;
      color: #1a1a18;
    }
    input:focus, select:focus { outline: none; border-color: #185fa5; box-shadow: 0 0 0 2px #e6f1fb; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row input[type="checkbox"] { width: auto; }
    .actions { display: flex; gap: 8px; margin-top: 4px; }
    button {
      flex: 1;
      font: inherit;
      font-weight: 600;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: #185fa5; color: #fff; }
    .btn-primary:hover { background: #0c447c; }
    .btn-ghost { background: #f1efe8; color: #444441; }
    .btn-ghost:hover { background: #e6e3da; }
    #status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
    }
    .ok { color: #0f6e56; }
    .err { color: #993c1d; }
  </style>
</head>
<body>
  <h1>AI Translate 设置</h1>

  <div class="field">
    <label for="provider">AI 厂商</label>
    <select id="provider">
      <option value="openai">OpenAI（及兼容端点）</option>
    </select>
  </div>

  <div class="field">
    <label for="baseUrl">API 端点 Base URL <span class="hint">（含 /v1，如 https://api.openai.com/v1）</span></label>
    <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1" />
    <span class="hint">兼容任何 OpenAI 接口；留空用官方默认。</span>
  </div>

  <div class="field">
    <label for="apiKey">API Key</label>
    <div class="row">
      <input id="apiKey" type="password" placeholder="sk-..." />
      <input id="showKey" type="checkbox" title="显示" />
    </div>
  </div>

  <div class="field">
    <label for="modelSelect">模型</label>
    <div class="row">
      <select id="modelSelect" style="flex:1">
        <option value="__custom__">（点击"获取模型"加载列表，或手动输入）</option>
      </select>
      <button id="fetchModels" class="btn-ghost" type="button" style="flex:0 0 auto; white-space:nowrap">获取模型</button>
    </div>
    <input id="modelCustom" type="text" placeholder="或输入自定义模型名称" style="margin-top:4px; display:none" />
  </div>

  <div class="field">
    <label for="targetLang">默认目标语言</label>
    <select id="targetLang"></select>
  </div>

  <div class="actions">
    <button id="test" class="btn-ghost" type="button">测试连接</button>
    <button id="save" class="btn-primary" type="button">保存</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
